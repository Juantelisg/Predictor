services:
  - type: web
    name: bets-predictor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn predictor.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: THE_ODDS_API_KEY
        sync: false
      - key: LINEMATE_API_KEY
        sync: false
      - key: ENV
        value: production
    healthCheckPath: /api/budget
