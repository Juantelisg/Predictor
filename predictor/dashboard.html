<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>predictor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root{
    --bg:#0a0b0f; --panel:#13151b; --panel-2:#1a1d25;
    --line:rgba(255,255,255,.08); --line-2:rgba(255,255,255,.045);
    --txt:#eceef2; --dim:#8a90a0; --faint:#5c6270;
    --accent:#5eead4; --amber:#fbbf24;
    --r:14px; --maxw:880px; --shadow:0 8px 30px -16px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{background:var(--bg);color:var(--txt);font-family:Inter,system-ui,sans-serif;
    font-size:14px;line-height:1.5;letter-spacing:-.01em}
  .num{font-variant-numeric:tabular-nums}

  header{position:sticky;top:0;z-index:10;background:color-mix(in srgb,var(--bg) 82%,transparent);
    backdrop-filter:blur(14px);border-bottom:1px solid var(--line-2)}
  .bar{max-width:var(--maxw);margin:0 auto;padding:16px 22px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:-.03em;font-size:16px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 18%,transparent)}
  .brand span{color:var(--faint);font-weight:500}
  .spacer{flex:1}
  .chip{font-size:11.5px;color:var(--dim);background:var(--panel);border:1px solid var(--line);
    padding:5px 11px;border-radius:99px;white-space:nowrap}
  .chip b{color:var(--accent);font-weight:600}
  nav{max-width:var(--maxw);margin:0 auto;padding:0 22px;display:flex}
  .tab{padding:11px 2px;margin-right:22px;color:var(--dim);font-weight:600;font-size:13.5px;
    cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
  .tab:hover{color:var(--txt)} .tab.on{color:var(--txt);border-bottom-color:var(--accent)}

  main{max-width:var(--maxw);margin:0 auto;padding:22px 22px 60px}
  .note{font-size:11.5px;color:var(--faint);margin-bottom:14px;display:flex;align-items:center;gap:7px}
  .note::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .list{display:flex;flex-direction:column;gap:11px}

  /* ---- tarjeta = 1 partido ---- */
  .pcard{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--cat,var(--accent));
    border-radius:var(--r);padding:15px 17px;box-shadow:var(--shadow);transition:border-color .15s,transform .15s}
  .pcard:hover{border-color:rgba(255,255,255,.16);transform:translateY(-1px)}
  .phead{display:flex;align-items:center;gap:13px}
  .rank{font-weight:800;font-size:13px;color:var(--faint);min-width:24px}
  .pmain{flex:1;min-width:0}
  .match{font-weight:700;font-size:15.5px;letter-spacing:-.02em;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .vs{color:var(--faint);font-weight:500;font-size:12.5px}
  .ptag{font-size:9.5px;font-weight:700;letter-spacing:.06em;color:var(--cat,var(--accent));
    border:1px solid color-mix(in srgb,var(--cat,var(--accent)) 32%,transparent);
    padding:2px 6px;border-radius:5px;flex-shrink:0}
  .bscore{font-size:13px;font-weight:800;padding:5px 10px;border-radius:7px;font-variant-numeric:tabular-nums;flex-shrink:0}

  /* ---- logros (varios por partido) ---- */
  .logros{margin-top:13px;display:flex;flex-direction:column}
  .logro{display:flex;align-items:center;gap:11px;padding:8px 0;border-top:1px solid var(--line-2)}
  .lm{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);
    width:96px;flex-shrink:0}
  .lp{flex:1;font-weight:600;font-size:13px;color:var(--txt);min-width:0}
  .lv{font-weight:800;font-size:12.5px;padding:3px 9px;border-radius:6px;flex-shrink:0;font-variant-numeric:tabular-nums}
  .lvl-ALTA{color:var(--accent);background:color-mix(in srgb,var(--accent) 13%,transparent)}
  .lvl-MEDIA{color:var(--amber);background:color-mix(in srgb,var(--amber) 12%,transparent)}
  .lvl-BAJA{color:var(--dim);background:var(--panel-2)}

  /* ---- analisis (el por que) ---- */
  .pins{list-style:none;margin-top:11px;padding-top:11px;border-top:1px solid var(--line-2);
    display:flex;flex-direction:column;gap:5px}
  .pins li{position:relative;padding-left:14px;color:var(--dim);font-size:12px;line-height:1.5}
  .pins li::before{content:"";position:absolute;left:2px;top:7px;width:3px;height:3px;border-radius:50%;background:var(--faint)}

  .empty{padding:48px 20px;text-align:center;color:var(--dim);font-size:13.5px}
  .empty b{color:var(--txt)}
  .skel{height:150px;border-radius:var(--r);background:linear-gradient(100deg,
    var(--panel) 30%,var(--panel-2) 50%,var(--panel) 70%);background-size:200% 100%;animation:sh 1.3s infinite}
  @keyframes sh{to{background-position:-200% 0}}
  footer{max-width:var(--maxw);margin:0 auto;padding:0 22px 40px;color:var(--faint);
    font-size:11px;line-height:1.7;text-align:center}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand"><span class="dot"></span>predictor<span>/ análisis</span></div>
    <div class="spacer"></div>
    <div class="chip" id="date"></div>
    <div class="chip" id="budget">API ···</div>
  </div>
  <nav>
    <div class="tab on" data-v="mlb">⚾ MLB · Hoy</div>
    <div class="tab" data-v="soccer">⚽ Selecciones · Hoy</div>
  </nav>
</header>

<main id="view"></main>
<footer>
  Cada tarjeta = un partido. Los “logros” son mercados con su probabilidad calibrada (no “valor” ni “apuesta”).<br>
  Modelo puramente estadístico, sin cuotas. Educativo. La varianza es real.
</footer>

<script>
const V = document.getElementById("view");
const d = new Date(), DATE = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
document.getElementById("date").textContent = DATE;
let TAB = "mlb";
const MEM = {};   // cache de cliente -> cambiar de tab es instantaneo

document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
  TAB = t.dataset.v;
  document.querySelectorAll(".tab").forEach(x => x.classList.toggle("on", x.dataset.v===TAB));
  render();
});

function skeletons(){ V.innerHTML = `<div class="list">${'<div class="skel"></div>'.repeat(3)}</div>`; }

async function load(tab){
  if(MEM[tab]) return MEM[tab];
  const url = tab==="mlb" ? `/api/mlb/today?date=${DATE}` : `/api/soccer/today?date=${DATE}`;
  MEM[tab] = await (await fetch(url)).json();
  return MEM[tab];
}

function cardHTML(g){
  const logros = (g.logros||[]).map(l => `<div class="logro">
      <span class="lm">${l.market}</span><span class="lp">${l.pick}</span>
      <span class="lv lvl-${l.level} num">${l.prob}%</span></div>`).join("");
  const an = (g.analisis||[]).map(i => `<li>${i}</li>`).join("");
  return `<div class="pcard" style="--cat:${g.cat}">
    <div class="phead">
      <span class="rank num">#${g.rank}</span>
      <div class="pmain"><div class="match">${g.home} <span class="vs">vs</span> ${g.away}
        <span class="ptag">${g.tag}</span></div></div>
      <span class="bscore lvl-${g.hlevel} num">${g.hprob}%</span>
    </div>
    <div class="logros">${logros}</div>
    ${an ? `<ul class="pins">${an}</ul>` : ""}
  </div>`;
}

function renderCards(data){
  const c = data.cards||[];
  if(data.error) return V.innerHTML = `<div class="empty">Error: ${data.error}</div>`;
  if(!c.length) return V.innerHTML = `<div class="empty"><b>Sin partidos por analizar hoy.</b><br>${TAB==="mlb"?"Ya se jugaron o empezaron los de hoy.":"No hay selecciones jugando."}</div>`;
  V.innerHTML = `<div class="note">${data.note||""}</div><div class="list">${c.map(cardHTML).join("")}</div>`;
}

async function render(){
  if(MEM[TAB]){ renderCards(MEM[TAB]); }                 // instantaneo si ya cargo
  else { skeletons(); try{ renderCards(await load(TAB)); }
         catch(e){ V.innerHTML = `<div class="empty">No se pudo cargar. ¿El servidor está corriendo?</div>`; } }
  const other = TAB==="mlb" ? "soccer" : "mlb";          // prefetch del otro tab en background
  if(!MEM[other]) load(other).catch(()=>{});
}

fetch("/api/budget").then(r=>r.json()).then(b=>{
  if(b && b.remaining!=null) document.getElementById("budget").innerHTML = `API <b>${b.remaining}/${b.limit}</b>`;
}).catch(()=>{});

render();
</script>
</body>
</html>
