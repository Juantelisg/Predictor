<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>predictor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root{
    --bg:#0a0b0f; --panel:#13151b; --panel-2:#1a1d25;
    --line:rgba(255,255,255,.08); --line-2:rgba(255,255,255,.045);
    --txt:#eceef2; --dim:#8a90a0; --faint:#5c6270;
    --accent:#5eead4; --amber:#fbbf24;
    --r:14px; --maxw:880px; --shadow:0 8px 30px -16px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{background:var(--bg);color:var(--txt);font-family:Inter,system-ui,sans-serif;
    font-size:14px;line-height:1.5;letter-spacing:-.01em}
  .num{font-variant-numeric:tabular-nums}

  header{position:sticky;top:0;z-index:10;background:color-mix(in srgb,var(--bg) 82%,transparent);
    backdrop-filter:blur(14px);border-bottom:1px solid var(--line-2)}
  .bar{max-width:var(--maxw);margin:0 auto;padding:16px 22px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:-.03em;font-size:16px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 18%,transparent)}
  .brand span{color:var(--faint);font-weight:500}
  .spacer{flex:1}
  .chip{font-size:11.5px;color:var(--dim);background:var(--panel);border:1px solid var(--line);
    padding:5px 11px;border-radius:99px;white-space:nowrap}
  .chip b{color:var(--accent);font-weight:600}
  nav{max-width:var(--maxw);margin:0 auto;padding:0 22px;display:flex}
  .tab{padding:11px 2px;margin-right:22px;color:var(--dim);font-weight:600;font-size:13.5px;
    cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
  .tab:hover{color:var(--txt)} .tab.on{color:var(--txt);border-bottom-color:var(--accent)}

  main{max-width:var(--maxw);margin:0 auto;padding:22px 22px 60px}
  .note{font-size:11.5px;color:var(--faint);margin-bottom:14px;display:flex;align-items:center;gap:7px}
  .note::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .list{display:flex;flex-direction:column;gap:11px}

  /* ---- tarjeta MLB (legacy) = 1 partido ---- */
  .pcard{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--cat,var(--accent));
    border-radius:var(--r);padding:15px 17px;box-shadow:var(--shadow);transition:border-color .15s,transform .15s}
  .pcard:hover{border-color:rgba(255,255,255,.16);transform:translateY(-1px)}
  .phead{display:flex;align-items:center;gap:13px}
  .rank{font-weight:800;font-size:13px;color:var(--faint);min-width:24px}
  .pmain{flex:1;min-width:0}
  .match{font-weight:700;font-size:15.5px;letter-spacing:-.02em;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .vs{color:var(--faint);font-weight:500;font-size:12.5px}
  .ptag{font-size:9.5px;font-weight:700;letter-spacing:.06em;color:var(--cat,var(--accent));
    border:1px solid color-mix(in srgb,var(--cat,var(--accent)) 32%,transparent);
    padding:2px 6px;border-radius:5px;flex-shrink:0}
  .bscore{font-size:13px;font-weight:800;padding:5px 10px;border-radius:7px;font-variant-numeric:tabular-nums;flex-shrink:0}
  .logros{margin-top:13px;display:flex;flex-direction:column}
  .logro{display:flex;align-items:center;gap:11px;padding:8px 0;border-top:1px solid var(--line-2)}
  .lm{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);
    width:96px;flex-shrink:0}
  .lp{flex:1;font-weight:600;font-size:13px;color:var(--txt);min-width:0}
  .lv{font-weight:800;font-size:12.5px;padding:3px 9px;border-radius:6px;flex-shrink:0;font-variant-numeric:tabular-nums}
  .pins{list-style:none;margin-top:11px;padding-top:11px;border-top:1px solid var(--line-2);
    display:flex;flex-direction:column;gap:5px}
  .pins li{position:relative;padding-left:14px;color:var(--dim);font-size:12px;line-height:1.5}
  .pins li::before{content:"";position:absolute;left:2px;top:7px;width:3px;height:3px;border-radius:50%;background:var(--faint)}

  .lvl-ALTA{color:var(--accent);background:color-mix(in srgb,var(--accent) 13%,transparent)}
  .lvl-MEDIA{color:var(--amber);background:color-mix(in srgb,var(--amber) 12%,transparent)}
  .lvl-BAJA{color:var(--dim);background:var(--panel-2)}

  /* ---- fila Mundial (lista + desplegable) ---- */
  .wcrow{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--cat,var(--accent));
    border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
  .wchead{display:flex;align-items:center;gap:13px;padding:14px 16px;cursor:pointer;transition:background .15s}
  .wchead:hover{background:var(--panel-2)}
  .wctime{font-weight:700;font-size:13px;color:var(--dim);min-width:44px;font-variant-numeric:tabular-nums}
  .teams{flex:1;display:flex;align-items:center;gap:10px;min-width:0;flex-wrap:wrap}
  .team{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14.5px;letter-spacing:-.02em}
  .flag{width:27px;height:18px;border-radius:3px;object-fit:cover;background:var(--panel-2);
    flex-shrink:0;box-shadow:0 0 0 1px var(--line)}
  .vsx{color:var(--faint);font-weight:600;font-size:11.5px}
  .headprob{font-weight:800;font-size:12.5px;padding:4px 9px;border-radius:7px;font-variant-numeric:tabular-nums;flex-shrink:0}
  .chev{color:var(--faint);flex-shrink:0;transition:transform .2s;font-size:12px}
  .wcrow.open .chev{transform:rotate(90deg)}
  .wcbody{display:none;padding:2px 16px 16px}
  .wcrow.open .wcbody{display:block}

  .sec{margin-top:16px}
  .sec h4{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:9px}
  .mrow{display:flex;align-items:center;gap:10px;padding:6px 0;border-top:1px solid var(--line-2);font-size:13px}
  .mrow .ml{flex:1;color:var(--txt);font-weight:500;min-width:0}
  .mrow .mc{color:var(--faint);font-size:11.5px;font-variant-numeric:tabular-nums;min-width:60px;text-align:right}
  .mrow .mv{font-weight:800;font-size:12.5px;padding:3px 9px;border-radius:6px;font-variant-numeric:tabular-nums;min-width:48px;text-align:center}
  .pick{display:flex;align-items:center;gap:11px;padding:8px 11px;border-radius:9px;background:var(--panel-2);margin-bottom:6px}
  .pick .pm{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);width:88px;flex-shrink:0}
  .pick .pp{flex:1;font-weight:600;font-size:13.5px}
  .warn{font-size:11px;color:var(--amber);margin-top:7px;padding-left:1px}
  .lect .sum{font-weight:600;font-size:13.5px;color:var(--txt);margin-bottom:9px}
  .lect ul{list-style:none;display:flex;flex-direction:column;gap:7px}
  .lect li{position:relative;padding-left:15px;color:var(--dim);font-size:12.5px;line-height:1.55}
  .lect li::before{content:"";position:absolute;left:2px;top:7px;width:4px;height:4px;border-radius:50%;background:var(--accent)}
  .src{margin-top:10px;font-size:11px;color:var(--faint)}
  .src a{color:var(--accent);text-decoration:none;margin-right:12px;white-space:nowrap}
  .src a:hover{text-decoration:underline}
  .lmtr{display:flex;align-items:center;gap:9px;font-size:12px;padding:5px 0;border-top:1px solid var(--line-2);color:var(--dim)}
  .lmtr .w{flex:1;color:var(--txt);font-weight:500;min-width:0}
  .lmtr .hr{font-variant-numeric:tabular-nums;min-width:108px;text-align:right;font-size:11.5px}
  .pend{color:var(--faint);font-size:12px;font-style:italic;line-height:1.6}

  .empty{padding:48px 20px;text-align:center;color:var(--dim);font-size:13.5px}
  .empty b{color:var(--txt)}
  .skel{height:64px;border-radius:var(--r);background:linear-gradient(100deg,
    var(--panel) 30%,var(--panel-2) 50%,var(--panel) 70%);background-size:200% 100%;animation:sh 1.3s infinite}
  @keyframes sh{to{background-position:-200% 0}}
  footer{max-width:var(--maxw);margin:0 auto;padding:0 22px 40px;color:var(--faint);
    font-size:11px;line-height:1.7;text-align:center}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand"><span class="dot"></span>predictor<span>/ análisis</span></div>
    <div class="spacer"></div>
    <div class="chip" id="date"></div>
    <div class="chip" id="budget">API ···</div>
  </div>
  <nav>
    <div class="tab on" data-v="soccer">⚽ Mundial · Hoy</div>
    <div class="tab" data-v="mlb">⚾ MLB · Hoy</div>
  </nav>
</header>

<main id="view"></main>
<footer>
  Cada fila = un partido. Tocá para ver el cuadro, los picks confiables y la lectura de contexto.<br>
  Probabilidades de un modelo puramente estadístico, sin cuotas. “Calibrada” = tras recalibrador. Educativo. La varianza es real.
</footer>

<script>
const V = document.getElementById("view");
const d = new Date(), DATE = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
document.getElementById("date").textContent = DATE;
let TAB = "soccer";
const MEM = {};

document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
  TAB = t.dataset.v;
  document.querySelectorAll(".tab").forEach(x => x.classList.toggle("on", x.dataset.v===TAB));
  render();
});

function skeletons(){ V.innerHTML = `<div class="list">${'<div class="skel"></div>'.repeat(4)}</div>`; }
const pct = x => Math.round(x*100) + "%";
const esc = s => (s==null?"":String(s)).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

async function load(tab){
  if(MEM[tab]) return MEM[tab];
  const url = tab==="mlb" ? `/api/mlb/today?date=${DATE}` : `/api/wc/today?date=${DATE}`;
  MEM[tab] = await (await fetch(url)).json();
  return MEM[tab];
}

/* ---------- MLB (legacy) ---------- */
function cardHTML(g){
  const logros = (g.logros||[]).map(l => `<div class="logro">
      <span class="lm">${esc(l.market)}</span><span class="lp">${esc(l.pick)}</span>
      <span class="lv lvl-${l.level} num">${l.prob}%</span></div>`).join("");
  const an = (g.analisis||[]).map(i => `<li>${esc(i)}</li>`).join("");
  return `<div class="pcard" style="--cat:${g.cat}">
    <div class="phead"><span class="rank num">#${g.rank}</span>
      <div class="pmain"><div class="match">${esc(g.home)} <span class="vs">vs</span> ${esc(g.away)}
        <span class="ptag">${esc(g.tag)}</span></div></div>
      <span class="bscore lvl-${g.hlevel} num">${g.hprob}%</span></div>
    <div class="logros">${logros}</div>
    ${an ? `<ul class="pins">${an}</ul>` : ""}</div>`;
}

/* ---------- Mundial ---------- */
const flagImg = (url,code) => url
  ? `<img class="flag" src="${url}" alt="${esc(code)}" loading="lazy" onerror="this.style.visibility='hidden'">`
  : `<span class="flag" style="display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:var(--faint)">${esc(code)}</span>`;

function mrow(label, prob, cal){
  const lvl = prob>=.65?"ALTA":prob>=.55?"MEDIA":"BAJA";
  return `<div class="mrow"><span class="ml">${esc(label)}</span>
    ${cal!=null?`<span class="mc">cal ${pct(cal)}</span>`:""}
    <span class="mv lvl-${lvl} num">${pct(prob)}</span></div>`;
}

function cuadroHTML(a){
  const res = a.resultado.map(r => mrow(r.label, r.prob, r.cal)).join("");
  const dob = mrow("1X — "+a.home+" o empate", a.doble["1X"]) + mrow("X2 — "+a.away+" o empate", a.doble["X2"]) + mrow("12 — sin empate", a.doble["12"]);
  const g = a.goles;
  const gol = mrow("Over 1.5", g.over15)+mrow("Over 2.5", g.over25)+mrow("Over 3.5", g.over35)+mrow("Ambos marcan (BTTS)", g.btts);
  const val = mrow("Valla invicta "+a.home, a.valla.home)+mrow("Valla invicta "+a.away, a.valla.away);
  const cor = a.corners ? `<div class="sec"><h4>Córners · esperados ${a.corners.exp}</h4>${mrow("Over 8.5", a.corners.o85)+mrow("Over 9.5", a.corners.o95)+mrow("Over 10.5", a.corners.o105)}</div>` : "";
  const car = a.cards ? `<div class="sec"><h4>Tarjetas amarillas · esperadas ${a.cards.exp}</h4>${mrow("Over 3.5", a.cards.o35)+mrow("Over 4.5", a.cards.o45)}<div class="warn">⚠ el modelo tiende a SOBREESTIMAR tarjetas — leer con humildad</div></div>` : "";
  return `<div class="sec"><h4>Resultado 1X2 (cruda / calibrada)</h4>${res}</div>
    <div class="sec"><h4>Doble oportunidad</h4>${dob}</div>
    <div class="sec"><h4>Goles</h4>${gol}</div>
    <div class="sec"><h4>Valla invicta</h4>${val}</div>${cor}${car}`;
}

function picksHTML(a){
  if(!a.picks||!a.picks.length) return "";
  const ps = a.picks.map(p => `<div class="pick"><span class="pm">${esc(p.market)}</span>
    <span class="pp">${esc(p.pick)}</span><span class="mv lvl-${p.level} num">${pct(p.prob)}</span></div>`).join("");
  return `<div class="sec"><h4>Picks confiables</h4>${ps}</div>`;
}

function linemateHTML(a){
  if(!a.linemate||!a.linemate.length) return "";
  const tr = a.linemate.map(t => `<div class="lmtr"><span class="w">${esc(t.who)}</span>
    <span>${esc(t.market)} ${esc(t.side)}${t.line}</span>
    <span class="hr">L10 ${t.l10!=null?t.l10+"%":"-"} · año ${t.season!=null?t.season+"%":"-"}</span></div>`).join("");
  return `<div class="sec"><h4>Validación cruzada · Linemate (hit-rates, contexto)</h4>${tr}</div>`;
}

function lecturaHTML(c){
  const L = c.lectura;
  if(!L) return `<div class="sec"><h4>Lectura · contexto en vivo</h4>
    <div class="pend">Lectura no precomputada para este partido todavía. El cuadro y los picks salen del modelo;
    la lectura de contexto (lesiones / XI / racha) se agrega cuando se corre el análisis en vivo.</div></div>`;
  const sum = L.summary ? `<p class="sum">${esc(L.summary)}</p>` : "";
  const ctx = (L.context||[]).length ? `<ul>${L.context.map(x => `<li>${esc(x)}</li>`).join("")}</ul>` : "";
  const src = (L.sources||[]).length ? `<div class="src">Fuentes: ${L.sources.map(s => `<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.title)}</a>`).join("")}</div>` : "";
  return `<div class="sec lect"><h4>Lectura · contexto en vivo</h4>${sum}${ctx}${src}</div>`;
}

function wcRowHTML(c){
  const a = c.analysis;
  let head;
  if(a){
    const fav = a.resultado.reduce((m,r)=> r.cal>m.cal?r:m);
    const lvl = fav.cal>=.65?"ALTA":fav.cal>=.55?"MEDIA":"BAJA";
    head = `<span class="headprob lvl-${lvl} num" title="${esc(fav.label)}">${pct(fav.cal)}</span>`;
  } else {
    head = `<span class="headprob lvl-BAJA">s/d</span>`;
  }
  const body = a
    ? picksHTML(a)+cuadroHTML(a)+linemateHTML(a)+lecturaHTML(c)
    : `<div class="sec"><div class="pend">Análisis no disponible (${esc(c.analysis_error||"sin datos")}). ${lecturaHTML(c)}</div></div>`;
  return `<div class="wcrow" style="--cat:${c.cat}">
    <div class="wchead" onclick="this.parentNode.classList.toggle('open')">
      <span class="wctime">${esc(c.time)}</span>
      <div class="teams">
        <span class="team">${flagImg(c.home_flag,c.home_code)} ${esc(c.home)}</span>
        <span class="vsx">vs</span>
        <span class="team">${flagImg(c.away_flag,c.away_code)} ${esc(c.away)}</span>
      </div>
      ${head}<span class="chev">▶</span>
    </div>
    <div class="wcbody">${body}</div>
  </div>`;
}

function renderWC(data){
  if(data.error) return V.innerHTML = `<div class="empty">Error: ${esc(data.error)}</div>`;
  const c = data.cards||[];
  if(!c.length) return V.innerHTML = `<div class="empty"><b>Sin partidos del Mundial hoy.</b><br>(en hora argentina)</div>`;
  V.innerHTML = `<div class="note">${esc(data.note||"")}</div><div class="list">${c.map(wcRowHTML).join("")}</div>`;
}

function renderMLB(data){
  if(data.error) return V.innerHTML = `<div class="empty">Error: ${esc(data.error)}</div>`;
  const c = data.cards||[];
  if(!c.length) return V.innerHTML = `<div class="empty"><b>Sin partidos MLB por analizar hoy.</b></div>`;
  V.innerHTML = `<div class="note">${esc(data.note||"")}</div><div class="list">${c.map(cardHTML).join("")}</div>`;
}

async function render(){
  const draw = TAB==="mlb" ? renderMLB : renderWC;
  if(MEM[TAB]){ draw(MEM[TAB]); }
  else { skeletons(); try{ draw(await load(TAB)); }
         catch(e){ V.innerHTML = `<div class="empty">No se pudo cargar. ¿El servidor está corriendo?</div>`; } }
  const other = TAB==="mlb" ? "soccer" : "mlb";
  if(!MEM[other]) load(other).catch(()=>{});
}

fetch("/api/budget").then(r=>r.json()).then(b=>{
  if(b && b.remaining!=null) document.getElementById("budget").innerHTML = `API <b>${b.remaining}/${b.limit}</b>`;
}).catch(()=>{});

render();
</script>
</body>
</html>
