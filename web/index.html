<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Edge — análisis deportivo</title>
<style>
  :root{--bg:#0a0e14;--panel:#141a23;--panel2:#1b2230;--line:#232c3b;--txt:#e6edf3;
        --dim:#8b97a7;--accent:#1ed760;--accent2:#19b34c;--warn:#ffb020;--red:#ff5468;--chip:#202938;--blue:#4f7cff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  a{color:inherit;text-decoration:none}
  .nav{display:flex;align-items:center;gap:18px;padding:12px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:5}
  .brand{font-size:18px;font-weight:800}.brand b{color:var(--accent)}
  select{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:9px;padding:7px 10px;font-weight:600;font-size:13px;cursor:pointer}
  .nlink{color:var(--dim);font-weight:700;font-size:14px;cursor:pointer;padding:4px 2px}
  .nlink.on{color:var(--txt);border-bottom:2px solid var(--accent);padding-bottom:8px}
  .wrap{max-width:1180px;margin:0 auto;padding:18px 16px 60px}
  h1{font-size:17px;margin:6px 2px 14px;font-weight:700}.h1d{color:var(--dim);font-weight:400;font-size:13px;margin-left:6px}

  /* home matchups */
  .matchups{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:11px}
  .mu{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 16px;cursor:pointer;transition:.12s}
  .mu:hover{border-color:var(--accent2)}
  .mu.live{opacity:.5}
  .mu .side{display:flex;flex-direction:column;align-items:center;gap:5px;width:62px}
  .mu .ab{width:38px;height:38px;border-radius:50%;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px}
  .mu .nm{font-size:11px;color:var(--dim)}
  .mu .mid{text-align:center;font-size:11px;color:var(--dim)}.mu .mid b{display:block;color:var(--txt);font-size:12px}
  .mu .pctmini{font-size:11px;font-weight:800;color:var(--accent)}

  .back{display:inline-flex;gap:6px;color:var(--dim);cursor:pointer;font-size:13px;margin:4px 0 12px}.back:hover{color:var(--txt)}
  .ghead{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:16px;margin-bottom:14px}
  .gtime{color:var(--dim);font-size:12.5px;margin-bottom:12px}
  .tw{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .team{background:var(--panel2);border-radius:11px;padding:12px}.team.fav .pc{color:var(--accent)}
  .team .nm{font-weight:700;font-size:14px;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .team .pc{font-size:26px;font-weight:800}.team .lbl{font-size:11px;color:var(--dim)}
  .team .bar{height:5px;background:var(--chip);border-radius:4px;margin:7px 0;overflow:hidden}.team .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent))}
  .team .od{font-size:12px;color:var(--dim);margin-top:6px}.team .od b{color:var(--txt)}
  .pickline{margin-top:13px;padding:11px 13px;border-radius:11px;font-size:13px}
  .pickline.has{background:rgba(30,215,96,.12);border:1px solid var(--accent2)}.pickline.no{background:var(--chip);color:var(--dim)}.pickline b{color:var(--accent)}

  /* trends + props */
  .mkts{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
  .mk{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:6px 13px;font-size:12px;font-weight:600;color:var(--dim);cursor:pointer}
  .mk.on{background:var(--blue);color:#fff;border-color:var(--blue)}
  .subtabs{display:flex;gap:18px;margin-bottom:12px}
  .st{color:var(--dim);font-weight:700;font-size:13px;cursor:pointer;padding-bottom:6px;border-bottom:2px solid transparent}.st.on{color:var(--txt);border-color:var(--accent)}
  .split2{display:grid;grid-template-columns:1fr 1.25fr;gap:16px}
  @media(max-width:840px){.split2{grid-template-columns:1fr}}
  .sec{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);font-weight:700;margin:0 2px 10px}.sec .n{color:var(--accent)}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 13px;margin-bottom:7px;cursor:pointer}
  .pcard:hover{border-color:#31405a}.pcard.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .ptop{display:flex;align-items:center;gap:10px}.ptop .pn{font-weight:700;font-size:13px;flex:1}.ptop .pn span{color:var(--dim);font-weight:500;font-size:11.5px}
  .ptop .hr{font-weight:800;color:var(--accent);font-size:14px}
  .pprop{font-size:12.5px;margin:3px 0 6px}
  .hbar{height:4px;background:var(--chip);border-radius:4px;overflow:hidden}.hbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent))}

  .detail{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:15px;position:sticky;top:70px}
  .detail h3{font-size:15px}.detail .dsub{color:var(--dim);font-size:12px;margin:2px 0 12px}
  .splittabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .sp{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:11.5px;font-weight:600;color:var(--dim);cursor:pointer}.sp.on{background:var(--txt);color:#06140a;border-color:var(--txt)}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:right;color:var(--dim);font-weight:600;font-size:10px;text-transform:uppercase;padding:5px 5px;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}td{padding:6px 5px;border-bottom:1px solid var(--line)}
  .yes{color:var(--accent);font-weight:800}.no{color:var(--red);font-weight:800}.vcol{font-weight:800}
  .empty{background:var(--panel);border:1px dashed var(--line);border-radius:13px;padding:26px;text-align:center;color:var(--dim);font-size:13px;line-height:1.5}.empty .big{font-size:26px;margin-bottom:6px}.empty b{color:var(--txt)}
  .loading{color:var(--dim);padding:24px;text-align:center}

  /* analizar */
  .btn{display:inline-block;background:var(--accent);color:#06140a;font-weight:800;border-radius:9px;padding:9px 20px;cursor:pointer;font-size:13px}
  .abtnghost{color:var(--dim);cursor:pointer;font-size:13px;margin-left:12px;font-weight:600}
  .atab{width:100%;border-collapse:separate;border-spacing:0 6px;font-size:13px}
  .atab th{text-align:left;color:var(--dim);font-weight:600;font-size:10px;text-transform:uppercase;padding:0 6px}
  .atab td{padding:0 6px}
  .ain{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:7px 9px;font-size:13px;width:100%}
  .adel{color:var(--red);cursor:pointer;font-weight:800;font-size:13px}
  .card2{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
  .ata{width:100%;min-height:120px;margin-top:10px;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:10px;font:12.5px/1.5 ui-monospace,monospace;resize:vertical}
  .hint{color:var(--dim);font-size:12px;line-height:1.55}.hint code{background:var(--chip);padding:1px 5px;border-radius:4px}.hint b{color:var(--txt)}
  .rtab{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
  .rtab th{text-align:right;color:var(--dim);font-weight:600;font-size:10px;text-transform:uppercase;padding:6px 6px;border-bottom:1px solid var(--line)}
  .rtab th:first-child,.rtab td:first-child{text-align:left}.rtab td{text-align:right;padding:8px 6px;border-bottom:1px solid var(--line)}
  .foot{margin-top:24px;color:#5c6677;font-size:11px;text-align:center;line-height:1.6}
</style>
</head>
<body>
<div class="nav">
  <div class="brand">Edge<b>.</b></div>
  <select id="sportsel"></select>
  <span class="nlink on" data-v="home">Home</span>
  <span class="nlink" data-v="trends">Trends</span>
  <span class="nlink" data-v="analizar">Analizar</span>
</div>
<div class="wrap"><div id="content"><div class="loading">cargando…</div></div>
  <div class="foot">El % de equipo = prob. de ganar (consenso de casas, sin comisión). El % de jugador = veces que le pegó al prop en sus últimos partidos reales.<br>
    Análisis con fines educativos / entretenimiento. Apostar implica riesgo de pérdida total.</div></div>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script>
let SPORT="mlb", VIEW="home", MARKET="Todos", PTAB="player", AMODE="manual";
const COMBOS=[["Hits",0.5],["Hits",1.5],["Bases totales",1.5],["Carreras",0.5],["Impulsadas",0.5],["Home Run",0.5],["H+R+RBI",1.5],["Singles",0.5],["Dobles",0.5],["Bases robadas",0.5],["Ponches",0.5]];
const MARKETS=["Todos","Hits","Bases totales","Carreras","Impulsadas","Home Run","H+R+RBI","Singles","Dobles","Bases robadas","Ponches"];
const _d=new Date();const DATE=`${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`;
const C=document.getElementById("content");
const fmtOdd=o=>o==null?"—":(typeof o==="number"?(o>0?"+"+o:""+o):o);
const fmtT=iso=>iso?new Date(iso).toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}):"";
const pc=p=>p==null?"—":Math.round(p*100)+"%";

async function initNav(){
  const sp=await(await fetch("/api/sports")).json();
  document.getElementById("sportsel").innerHTML=sp.map(s=>`<option value="${s.key}" ${s.key===SPORT?'selected':''}>${s.label}</option>`).join("");
  document.getElementById("sportsel").onchange=e=>{SPORT=e.target.value;render();};
  document.querySelectorAll(".nlink").forEach(n=>n.onclick=()=>{VIEW=n.dataset.v;
    document.querySelectorAll(".nlink").forEach(x=>x.classList.toggle("on",x.dataset.v===VIEW));render();});
}
function render(){ VIEW==="trends"?renderTrends():VIEW==="analizar"?renderAnalyze():renderHome(); }

/* ---------------- HOME ---------------- */
async function renderHome(){
  C.innerHTML=`<div class="loading">cargando partidos…</div>`;
  const d=await(await fetch(`/api/slate?sport=${SPORT}&date=${DATE}`)).json();
  const games=(d.games||[]).sort((a,b)=>(a.status==="not_started"?0:1)-(b.status==="not_started"?0:1));
  if(!games.length){C.innerHTML=`<h1>Partidos de hoy<span class="h1d">${SPORT.toUpperCase()}</span></h1><div class="empty"><div class="big">🌙</div>No hay partidos hoy.</div>`;return;}
  let h=`<h1>Partidos de hoy<span class="h1d">${SPORT.toUpperCase()} · ${d.date} · tocá uno para el análisis</span></h1><div class="matchups">`;
  games.forEach((g,i)=>{const live=g.status&&g.status!=="not_started";
    const fa=!live&&g.fair_away!=null?Math.round(g.fair_away*100)+"%":"";const fh=!live&&g.fair_home!=null?Math.round(g.fair_home*100)+"%":"";
    h+=`<div class="mu ${live?'live':''}" data-i="${i}">
      <div class="side"><div class="ab">${g.away_abbr||''}</div><div class="nm">${fa}</div></div>
      <div class="mid">${live?'<b style="color:var(--red)">LIVE</b>':'<b>'+fmtT(g.start_time)+'</b>'}<div>vs</div></div>
      <div class="side"><div class="ab">${g.home_abbr||''}</div><div class="nm">${fh}</div></div></div>`;});
  C.innerHTML=h+`</div>`;
  HGAMES=games;
  document.querySelectorAll(".mu").forEach(el=>el.onclick=()=>openGame(HGAMES[+el.dataset.i]));
}
let HGAMES=[];
async function openGame(g){
  const live=g.status&&g.status!=="not_started", homeFav=(g.fair_home||0)>=(g.fair_away||0);
  let pick=`<div class="pickline no">Mercado parejo: sin pick de equipo con valor claro. Mirá los jugadores abajo.</div>`;
  if(g.is_candidate){const f=homeFav?[g.home,g.fair_home,g.odds_home]:[g.away,g.fair_away,g.odds_away];
    pick=`<div class="pickline has">▲ <b>Oportunidad:</b> valor en <b>${f[0]}</b> (${pc(f[1])} vs ${pc(g.pm_home)} del mercado). Mejor cuota ${fmtOdd(f[2])}.</div>`;}
  const tb=(n,p,o,f)=>`<div class="team ${f?'fav':''}"><div class="nm">${n}</div><div class="pc">${pc(p)}</div><div class="lbl">prob. de ganar</div><div class="bar"><i style="width:${p?Math.round(p*100):0}%"></i></div><div class="od">mejor cuota <b>${fmtOdd(o)}</b></div></div>`;
  C.innerHTML=`<div class="back" id="back">‹ volver</div><div class="ghead"><div class="gtime">${g.league?g.league+' · ':''}${live?'EN JUEGO':fmtT(g.start_time)+' hs'}</div>
    <div class="tw">${tb(g.away,g.fair_away,g.odds_away,!homeFav&&!live)}${tb(g.home,g.fair_home,g.odds_home,homeFav&&!live)}</div>${live?'':pick}</div><div id="pp"></div>`;
  document.getElementById("back").onclick=renderHome;
  const pp=document.getElementById("pp");
  if(SPORT!=="mlb"||live){pp.innerHTML=SPORT!=="mlb"?`<div class="sec">Jugadores</div><div class="empty">Props de jugadores: por ahora solo MLB.</div>`:"";return;}
  pp.innerHTML=`<div class="sec">Picks de jugadores</div><div class="loading">buscando jugadores y su historial…</div>`;
  const d=await(await fetch("/api/props?"+new URLSearchParams({sport:"mlb",date:DATE,home:g.home,away:g.away}))).json();
  const ps=d.picks||[];
  if(!ps.length){pp.innerHTML=`<div class="sec">Picks de jugadores</div><div class="empty">Sin tendencias fuertes (o lineup no publicado).</div>`;return;}
  pp.innerHTML=`<div class="sec">Picks de jugadores <span class="n">${ps.length}</span></div><div class="split2"><div id="pl"></div><div><div id="dt" class="detail"><div class="empty">Tocá un pick.</div></div></div></div>`;
  renderPickList(ps,document.getElementById("pl"),document.getElementById("dt"));
}

/* ---------------- TRENDS ---------------- */
async function renderTrends(){
  if(SPORT!=="mlb"){C.innerHTML=`<h1>Trends<span class="h1d">hot picks del día</span></h1><div class="empty"><div class="big">🔧</div>Trends de jugadores: por ahora solo MLB.</div>`;return;}
  C.innerHTML=`<h1>Trends<span class="h1d">hot picks del día · ${DATE}</span></h1>
    <div class="subtabs"><span class="st ${PTAB==='player'?'on':''}" data-t="player">Jugadores</span><span class="st ${PTAB==='team'?'on':''}" data-t="team">Equipos</span></div>
    <div class="mkts" id="mkts"></div><div id="tbody"><div class="loading">calculando tendencias del día…</div></div>`;
  document.querySelectorAll(".st").forEach(s=>s.onclick=()=>{PTAB=s.dataset.t;renderTrends();});
  if(PTAB==="team"){document.getElementById("mkts").innerHTML="";document.getElementById("tbody").innerHTML=`<div class="empty"><div class="big">🛠️</div><b>Trends de equipos en camino.</b><br>ML / Spread / Total con rachas de cobertura. Necesita el historial de resultados por equipo (siguiente paso).</div>`;return;}
  document.getElementById("mkts").innerHTML=MARKETS.map(m=>`<span class="mk ${m===MARKET?'on':''}" data-m="${m}">${m}</span>`).join("");
  document.querySelectorAll(".mk").forEach(el=>el.onclick=()=>{MARKET=el.dataset.m;renderTrends();});
  const d=await(await fetch("/api/trends?"+new URLSearchParams({sport:"mlb",date:DATE,market:MARKET}))).json();
  const tr=d.trends||[];
  const body=document.getElementById("tbody");
  if(!tr.length){body.innerHTML=`<div class="empty">Sin tendencias para este filtro (o todavía no hay partidos pre-partido con lineup).</div>`;return;}
  body.innerHTML=`<div class="split2"><div><div class="sec">Tendencias <span class="n">${tr.length}</span></div><div id="pl"></div></div>
    <div><div id="dt" class="detail"><div class="empty">Tocá una tendencia para ver el historial y los splits.</div></div></div></div>`;
  renderPickList(tr,document.getElementById("pl"),document.getElementById("dt"));
}

/* ---------- lista de picks + detalle con splits (compartido) ---------- */
function renderPickList(picks,listEl,detEl){
  listEl.innerHTML=picks.map((p,i)=>`<div class="pcard" data-i="${i}"><div class="ptop"><div class="pn">${p.player} <span>vs ${(p.opp||'').split(' ').slice(-1)[0]}</span></div><div class="hr">${Math.round(p.rate*100)}%</div></div>
    <div class="pprop">${p.prop}</div><div class="hbar"><i style="width:${Math.round(p.rate*100)}%"></i></div></div>`).join("");
  listEl.querySelectorAll(".pcard").forEach(c=>c.onclick=()=>{listEl.querySelectorAll(".pcard").forEach(x=>x.classList.remove("sel"));c.classList.add("sel");showDetail(picks[+c.dataset.i],detEl,"all");});
}
async function showDetail(p,detEl,mode){
  detEl.innerHTML=`<div class="loading">cargando historial…</div>`;
  const tabs=[["all","Todos"],["last10","Últimos 10"],["h2h","vs "+(p.opp||'').split(' ').slice(-1)[0]],["home","Local"],["away","Visita"]];
  const d=await(await fetch("/api/gamelog?"+new URLSearchParams({player_id:p.player_id,label:p.label,line:p.line,side:p.side,date:DATE,mode,opp:p.opp||""}))).json();
  const rows=d.rows||[];
  detEl.innerHTML=`<h3>${p.player} — ${p.prop}</h3><div class="dsub">${d.n?`Pegó ${d.hit} de ${d.n} en este filtro · ${Math.round((d.hit/d.n)*100)}%`:'sin partidos en este filtro'}</div>
    <div class="splittabs">${tabs.map(t=>`<span class="sp ${t[0]===mode?'on':''}" data-m="${t[0]}">${t[1]}</span>`).join("")}</div>
    <table><thead><tr><th>Fecha</th><th>Rival</th><th>L/V</th><th>Pegó</th><th>${p.label}</th><th>H</th><th>TB</th><th>R</th><th>RBI</th><th>AB</th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td>${(r.date||'').slice(5)}</td><td>${(r.opp||'').split(' ').slice(-1)[0]}</td><td>${r.home?'L':'V'}</td><td class="${r.hit?'yes':'no'}">${r.hit?'✓':'✗'}</td><td class="vcol">${r.val}</td><td>${r.H}</td><td>${r.TB}</td><td>${r.R}</td><td>${r.RBI}</td><td>${r.AB}</td></tr>`).join("")}
    ${rows.length?'':'<tr><td colspan="10" style="text-align:center;color:var(--dim);padding:14px">sin partidos en este split</td></tr>'}</tbody></table>`;
  detEl.querySelectorAll(".sp").forEach(s=>s.onclick=()=>showDetail(p,detEl,s.dataset.m));
}

/* ---------------- ANALIZAR ---------------- */
function comboOpts(){return COMBOS.map(c=>`<option value="${c[0]}|${c[1]}">${c[0]} ${c[1]}</option>`).join("");}
function arow(p){p=p||{};return `<tr class="arow">
  <td><input class="ain aj" placeholder="Jugador" value="${p.jugador||''}"></td>
  <td><select class="ain am">${comboOpts()}</select></td>
  <td><select class="ain al"><option>Over</option><option>Under</option></select></td>
  <td><input class="ain ao" placeholder="+150" value="${p.cuota||''}" style="width:90px"></td>
  <td><span class="adel">✕</span></td></tr>`;}
function bindDel(){document.querySelectorAll(".adel").forEach(d=>d.onclick=()=>d.closest("tr").remove());}

function renderAnalyze(){
  C.innerHTML=`<h1>Analizar<span class="h1d">cargá tus props y te digo si hay valor en TU cuota · ${DATE}</span></h1>
   <div class="subtabs"><span class="st ${AMODE==='manual'?'on':''}" data-a="manual">Manual</span><span class="st ${AMODE==='cargar'?'on':''}" data-a="cargar">Excel / pegar</span></div>
   <div id="ainput"></div>
   <div style="margin:14px 0"><span class="btn" id="goan">Analizar</span><span class="abtnghost" id="addrow">+ fila</span></div>
   <div id="ares"></div>`;
  document.querySelectorAll(".st").forEach(s=>s.onclick=()=>{AMODE=s.dataset.a;renderAnalyze();});
  const inp=document.getElementById("ainput");
  if(AMODE==="manual"){
    inp.innerHTML=`<table class="atab"><thead><tr><th>Jugador</th><th>Mercado</th><th>Lado</th><th>Tu cuota</th><th></th></tr></thead><tbody id="atb">${arow()}${arow()}</tbody></table>`;
    bindDel();
    document.getElementById("addrow").onclick=()=>{document.getElementById("atb").insertAdjacentHTML("beforeend",arow());bindDel();};
  } else {
    document.getElementById("addrow").style.display="none";
    inp.innerHTML=`<div class="card2"><p class="hint">Subí un <b>.xlsx</b> o pegá filas de Excel. Columnas en orden: <b>jugador, mercado, línea, lado, cuota</b>.<br>Ej: <code>Yandy Diaz	hits	0.5	Over	+150</code></p>
      <input type="file" id="xls" accept=".xlsx,.xls,.csv" style="margin:8px 0;color:var(--dim)">
      <textarea id="paste" class="ata" placeholder="Pegá acá (una fila por línea; columnas separadas por tab, coma o ;)…"></textarea></div>`;
    document.getElementById("xls").onchange=loadXls;
  }
  document.getElementById("goan").onclick=runAnalyze;
}
function loadXls(e){
  const f=e.target.files[0]; if(!f)return;
  if(typeof XLSX==="undefined"){alert("No se pudo cargar el lector de Excel (¿sin internet?). Pegá las filas en el recuadro.");return;}
  const rd=new FileReader();
  rd.onload=ev=>{const wb=XLSX.read(ev.target.result,{type:"binary"});const ws=wb.Sheets[wb.SheetNames[0]];
    document.getElementById("paste").value=XLSX.utils.sheet_to_json(ws,{header:1}).map(r=>r.join("\t")).join("\n");};
  rd.readAsBinaryString(f);
}
function collectManual(){
  return [...document.querySelectorAll("#atb .arow")].map(tr=>{
    const j=tr.querySelector(".aj").value.trim(); if(!j)return null;
    const ml=tr.querySelector(".am").value.split("|");
    return {jugador:j,mercado:ml[0],linea:parseFloat(ml[1]),lado:tr.querySelector(".al").value,cuota:tr.querySelector(".ao").value.trim()};
  }).filter(Boolean);
}
function parsePaste(txt){
  return txt.split(/\r?\n/).map(l=>l.trim()).filter(Boolean).map(line=>{
    const c=line.split(/\t|,|;/).map(x=>x.trim());
    if(/jugador|player|nombre/i.test(c[0]))return null;
    return {jugador:c[0],mercado:c[1],linea:c[2],lado:c[3]||"Over",cuota:c[4]||""};
  }).filter(Boolean);
}
async function runAnalyze(){
  const props=AMODE==="manual"?collectManual():parsePaste(document.getElementById("paste").value);
  const res=document.getElementById("ares");
  if(!props.length){res.innerHTML=`<div class="empty">Cargá al menos un prop (jugador + mercado + cuota).</div>`;return;}
  res.innerHTML=`<div class="loading">analizando ${props.length} props…</div>`;
  let d;
  try{d=await(await fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({props,date:DATE})})).json();}
  catch(e){res.innerHTML=`<div class="empty">Error de conexión con el análisis.</div>`;return;}
  if(d.error){res.innerHTML=`<div class="empty">Error: ${d.error}</div>`;return;}
  renderAresults(d.results||[],res);
}
function renderAresults(rows,el){
  const verd=r=>r.error?`<span class="no">${r.error}</span>`:!r.verdict?'—':(r.verdict==="APOSTAR"?`<span class="yes">APOSTAR${r.suspect?' ⚠':''}</span>`:`<span style="color:var(--dim)">PASAR</span>`);
  const e2=r=>r.edge==null?'—':`<span class="${r.edge>0?'yes':r.edge<0?'no':''}">${r.edge*100>=0?'+':''}${(r.edge*100).toFixed(1)}%</span>`;
  el.innerHTML=`<div class="sec">Resultado <span class="n">${rows.length}</span></div>
   <table class="rtab"><thead><tr><th>Jugador</th><th>Prop</th><th>Modelo</th><th>Cuota justa</th><th>Tu cuota</th><th>Edge</th><th>EV</th><th>Veredicto</th></tr></thead><tbody>
   ${rows.map(r=>`<tr>
     <td>${r.player||r.jugador||'?'}</td>
     <td>${r.lado||''} ${r.linea!=null?r.linea:''} ${r.mercado||''}</td>
     <td>${r.model!=null?Math.round(r.model*100)+'%':'—'}</td>
     <td>${r.fair_line!=null?fmtOdd(r.fair_line):'—'}</td>
     <td>${r.cuota||'—'}</td>
     <td>${e2(r)}</td>
     <td>${r.ev!=null?(r.ev>=0?'+':'')+(r.ev*100).toFixed(0)+'%':'—'}</td>
     <td class="vcol">${verd(r)}</td></tr>`).join("")}
   </tbody></table>
   <div class="hint" style="margin-top:12px"><b>Modelo</b> = prob. calibrada (regresión a la media, K=30). <b>Cuota justa</b> = el precio sin valor ni a favor ni en contra. Si TU cuota paga más que la justa → hay valor. <b>⚠</b> = edge sospechosamente grande, revisá que la cuota sea la tuya.<br>Educativo. Apostar implica riesgo de pérdida total.</div>`;
}

initNav().then(render);
</script>
