<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Edge — análisis deportivo</title>
<style>
  :root{--bg:#0a0e14;--panel:#141a23;--panel2:#1b2230;--line:#232c3b;--txt:#e6edf3;
        --dim:#8b97a7;--accent:#1ed760;--accent2:#19b34c;--warn:#ffb020;--red:#ff5468;--chip:#202938}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  .wrap{max-width:980px;margin:0 auto;padding:18px 16px 60px}
  .top{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{font-size:20px;font-weight:800;letter-spacing:-.5px}.brand b{color:var(--accent)}
  .tabs{display:flex;gap:6px;margin-left:auto;background:var(--panel);padding:4px;border-radius:12px;border:1px solid var(--line)}
  .tab{padding:7px 16px;border-radius:9px;color:var(--dim);cursor:pointer;font-weight:600;font-size:13px;user-select:none}
  .tab:hover{color:var(--txt)}.tab.on{background:var(--accent);color:#06140a}
  h1{font-size:16px;margin:18px 2px 12px;font-weight:700}
  .sub{color:var(--dim);font-size:13px;font-weight:400;margin-left:6px}

  /* lista de partidos */
  .glist .g{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 16px;margin-bottom:9px;cursor:pointer;transition:.12s}
  .glist .g:hover{border-color:var(--accent2);transform:translateX(2px)}
  .glist .when{font-size:12px;color:var(--dim);width:54px;flex:none}
  .glist .mt{font-weight:700;font-size:14.5px;flex:1}
  .glist .fav{font-size:12.5px;color:var(--dim)}.glist .fav b{color:var(--accent)}
  .glist .hint{font-size:11.5px;color:var(--dim);background:var(--chip);padding:3px 9px;border-radius:20px;flex:none}
  .glist .ar{color:var(--dim);font-size:18px;flex:none}
  .live{opacity:.55}

  /* resumen de partido */
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--dim);cursor:pointer;font-size:13px;margin:6px 0 14px}
  .back:hover{color:var(--txt)}
  .ghead{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:16px;margin-bottom:14px}
  .gtime{color:var(--dim);font-size:12.5px;margin-bottom:12px}
  .tw{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .team{background:var(--panel2);border-radius:11px;padding:12px}
  .team .nm{font-weight:700;font-size:14px;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .team .pc{font-size:26px;font-weight:800}.team.fav .pc{color:var(--accent)}
  .team .lbl{font-size:11px;color:var(--dim)}
  .team .bar{height:5px;background:var(--chip);border-radius:4px;margin:7px 0;overflow:hidden}.team .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent))}
  .team .od{font-size:12px;color:var(--dim);margin-top:6px}.team .od b{color:var(--txt)}
  .pickline{margin-top:13px;padding:11px 13px;border-radius:11px;font-size:13px}
  .pickline.has{background:rgba(30,215,96,.12);border:1px solid var(--accent2);color:var(--txt)}
  .pickline.no{background:var(--chip);color:var(--dim)}
  .pickline b{color:var(--accent)}

  .sec{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);font-weight:700;margin:18px 2px 10px}
  .sec .n{color:var(--accent)}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:8px;cursor:pointer}
  .pcard:hover{border-color:#31405a}.pcard.open{border-color:var(--accent)}
  .ptop{display:flex;align-items:center;gap:10px}
  .ptop .pn{font-weight:700;font-size:13.5px;flex:1}.ptop .pn span{color:var(--dim);font-weight:500;font-size:12px}
  .ptop .hr{font-weight:800;color:var(--accent);font-size:15px}
  .pprop{font-size:13px;color:var(--txt);margin:3px 0 7px}
  .hbar{height:5px;background:var(--chip);border-radius:4px;overflow:hidden}.hbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent))}
  .pwhat{font-size:11.5px;color:var(--dim);margin-top:5px}
  .log{margin-top:11px;border-top:1px solid var(--line);padding-top:10px;display:none}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:right;color:var(--dim);font-weight:600;font-size:10px;text-transform:uppercase;padding:5px 5px;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}
  td{padding:6px 5px;border-bottom:1px solid var(--line)}
  .yes{color:var(--accent);font-weight:800}.no{color:var(--red);font-weight:800}.vcol{font-weight:800}
  .empty{background:var(--panel);border:1px dashed var(--line);border-radius:13px;padding:26px;text-align:center;color:var(--dim);font-size:13px;line-height:1.5}
  .empty .big{font-size:28px;margin-bottom:6px}.empty b{color:var(--txt)}
  .loading{color:var(--dim);padding:26px;text-align:center}
  .foot{margin-top:26px;color:#5c6677;font-size:11px;text-align:center;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="brand">Edge<b>.</b></div><div class="tabs" id="tabs"></div></div>
  <div id="content"><div class="loading">cargando…</div></div>
  <div class="foot">El % es la probabilidad de ganar según el consenso de casas (sin comisión).
    En los jugadores, el % es cuántas veces le pegó al prop en sus últimos partidos reales.<br>
    Análisis con fines educativos / entretenimiento. Apostar implica riesgo de pérdida total.</div>
</div>
<script>
let SPORT="mlb", GAMES=[];
const _d=new Date();
const DATE=`${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`;
const C=document.getElementById("content");
const fmtOdd=o=>o==null?"—":(typeof o==="number"?(o>0?"+"+o:""+o):o);
const fmtWhen=iso=>{if(!iso)return"";const d=new Date(iso);return d.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});};
const pc=p=>p==null?"—":Math.round(p*100)+"%";

async function loadTabs(){
  const sp=await(await fetch("/api/sports")).json();
  tabs.innerHTML=sp.map(s=>`<div class="tab ${s.key===SPORT?'on':''}" data-k="${s.key}">${s.label}</div>`).join("");
  document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{SPORT=t.dataset.k;
    document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on",x.dataset.k===SPORT));listGames();});
}

/* ---- lista de partidos ---- */
async function listGames(){
  C.innerHTML=`<div class="loading">cargando partidos…</div>`;
  const d=await(await fetch(`/api/slate?sport=${SPORT}&date=${DATE}`)).json();
  GAMES=d.games||[];
  GAMES.sort((a,b)=>(a.status==="not_started"?0:1)-(b.status==="not_started"?0:1));
  if(!GAMES.length){C.innerHTML=`<h1>Partidos de hoy <span class="sub">${SPORT.toUpperCase()}</span></h1><div class="empty"><div class="big">🌙</div>No hay partidos de ${SPORT.toUpperCase()} hoy.</div>`;return;}
  let html=`<h1>Partidos de hoy <span class="sub">${SPORT.toUpperCase()} · tocá uno para ver el análisis</span></h1><div class="glist">`;
  GAMES.forEach((g,i)=>{
    const live=g.status&&g.status!=="not_started";
    let fav="";
    if(!live&&g.fair_home!=null){const o=[[g.home,g.fair_home],[g.away,g.fair_away]];if(g.fair_draw!=null)o.push(["Empate",g.fair_draw]);o.sort((a,b)=>b[1]-a[1]);fav=`<b>${o[0][0]}</b> ${Math.round(o[0][1]*100)}%`;}
    html+=`<div class="g ${live?'live':''}" data-i="${i}">
      <div class="when">${live?'<span style="color:var(--red)">live</span>':fmtWhen(g.start_time)}</div>
      <div class="mt">${g.away} <span style="color:var(--dim);font-weight:400">@</span> ${g.home}<div class="fav">${live?'en juego':fav?'Favorito: '+fav:'sin cuotas'}</div></div>
      ${(!live&&SPORT==='mlb')?'<div class="hint">ver picks ⚾</div>':''}
      <div class="ar">›</div></div>`;
  });
  C.innerHTML=html+`</div>`;
  document.querySelectorAll(".glist .g").forEach(el=>el.onclick=()=>openGame(GAMES[+el.dataset.i]));
}

/* ---- resumen de un partido ---- */
function teamBox(name,prob,odds,fav){
  return `<div class="team ${fav?'fav':''}"><div class="nm">${name}</div>
    <div class="pc">${pc(prob)}</div><div class="lbl">prob. de ganar</div>
    <div class="bar"><i style="width:${prob?Math.round(prob*100):0}%"></i></div>
    <div class="od">mejor cuota <b>${fmtOdd(odds)}</b></div></div>`;
}
async function openGame(g){
  const live=g.status&&g.status!=="not_started";
  const homeFav=(g.fair_home||0)>=(g.fair_away||0);
  let pick=`<div class="pickline no">El mercado está parejo: no hay un pick de equipo con valor claro. Mirá los picks de jugadores abajo.</div>`;
  if(g.is_candidate){const f=homeFav?[g.home,g.fair_home,g.odds_home]:[g.away,g.fair_away,g.odds_away];
    pick=`<div class="pickline has">▲ <b>Oportunidad:</b> el modelo ve valor en <b>${f[0]}</b> — le da ${pc(f[1])} vs ${pc(g.pm_home)} del prediction market. Mejor cuota ${fmtOdd(f[2])}.</div>`;}

  C.innerHTML=`<div class="back" id="back">‹ volver a los partidos</div>
    <div class="ghead">
      <div class="gtime">${g.league?g.league+' · ':''}${live?'EN JUEGO':fmtWhen(g.start_time)+' hs'}</div>
      <div class="tw">${teamBox(g.away,g.fair_away,g.odds_away,!homeFav&&!live)}${teamBox(g.home,g.fair_home,g.odds_home,homeFav&&!live)}</div>
      ${live?'':pick}
    </div>
    <div id="props"></div>`;
  document.getElementById("back").onclick=listGames;

  const pbox=document.getElementById("props");
  if(SPORT!=="mlb"){pbox.innerHTML=`<div class="sec">Picks de jugadores</div><div class="empty">Props de jugadores: por ahora solo en MLB.</div>`;return;}
  if(live){pbox.innerHTML="";return;}
  pbox.innerHTML=`<div class="sec">Picks de jugadores <span class="n">…</span></div><div class="loading">buscando jugadores y sus últimos partidos…</div>`;
  const q=new URLSearchParams({sport:"mlb",date:DATE,home:g.home,away:g.away});
  const d=await(await fetch("/api/props?"+q)).json();
  const picks=d.picks||[];
  if(!picks.length){pbox.innerHTML=`<div class="sec">Picks de jugadores</div><div class="empty">Sin tendencias fuertes en este partido (o el lineup no salió todavía).</div>`;return;}
  let html=`<div class="sec">Picks de jugadores <span class="n">${picks.length}</span></div>`;
  picks.forEach((p,i)=>{
    html+=`<div class="pcard" data-i="${i}"><div class="ptop">
      <div class="pn">${p.player} <span>vs ${p.opp}</span></div><div class="hr">${Math.round(p.rate*100)}%</div></div>
      <div class="pprop">${p.prop}</div>
      <div class="hbar"><i style="width:${Math.round(p.rate*100)}%"></i></div>
      <div class="pwhat">Le pegó a este resultado en ${p.hit} de sus últimos ${p.n} partidos. Tocá para ver el detalle.</div>
      <div class="log" id="log-${i}"></div></div>`;
  });
  pbox.innerHTML=html;
  document.querySelectorAll(".pcard").forEach(card=>card.onclick=e=>{
    if(e.target.closest(".log"))return;
    const i=+card.dataset.i, log=document.getElementById("log-"+i);
    if(log.style.display==="block"){log.style.display="none";card.classList.remove("open");return;}
    card.classList.add("open"); showLog(picks[i],log);
  });
}
async function showLog(p,log){
  log.style.display="block"; log.innerHTML=`<div class="loading" style="padding:12px">cargando…</div>`;
  const q=new URLSearchParams({player_id:p.player_id,statkey:p.statkey,label:p.label,line:p.line,side:p.side,date:DATE});
  const rows=(await(await fetch("/api/gamelog?"+q)).json()).rows||[];
  log.innerHTML=`<table><thead><tr><th>Fecha</th><th>Rival</th><th>Pegó</th><th>${p.label}</th><th>H</th><th>TB</th><th>R</th><th>RBI</th><th>AB</th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td>${(r.date||'').slice(5)}</td><td>${(r.opp||'').slice(0,3).toUpperCase()}</td><td class="${r.hit?'yes':'no'}">${r.hit?'✓':'✗'}</td><td class="vcol">${r.val}</td><td>${r.H}</td><td>${r.TB}</td><td>${r.R}</td><td>${r.RBI}</td><td>${r.AB}</td></tr>`).join("")}</tbody></table>`;
}

loadTabs().then(listGames);
</script>
</body>
</html>
